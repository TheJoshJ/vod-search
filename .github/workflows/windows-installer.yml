name: Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content apps/desktop/package.json | ConvertFrom-Json).version
          if ("v$packageVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} must match desktop package version v$packageVersion"
          }
      - name: Build installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: pnpm package:win
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: vod-search-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
