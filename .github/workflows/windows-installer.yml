name: Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  package:
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.15.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $packageVersion = (Get-Content apps/desktop/package.json | ConvertFrom-Json).version
          if ("v$packageVersion" -ne $env:RELEASE_TAG) {
            throw "Tag $env:RELEASE_TAG must match desktop package version v$packageVersion"
          }
      - name: Build installer artifact
        run: pnpm package:win
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vod-search-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: vod-search-windows
          path: release
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem -LiteralPath release -Filter '*.exe' |
            Where-Object Name -NotLike '*__uninstaller*' |
            Select-Object -First 1
          if (-not $installer) { throw "Windows installer is missing from the build artifact" }

          $safeInstaller = Join-Path $installer.DirectoryName ($installer.Name -replace ' ', '-')
          $blockmap = "$($installer.FullName).blockmap"
          $safeBlockmap = "$safeInstaller.blockmap"
          if ($installer.FullName -ne $safeInstaller) {
            Move-Item -LiteralPath $installer.FullName -Destination $safeInstaller -Force
          }
          if (Test-Path -LiteralPath $blockmap) {
            Move-Item -LiteralPath $blockmap -Destination $safeBlockmap -Force
          }

          $manifest = Join-Path $installer.DirectoryName 'latest.yml'
          if (-not (Test-Path -LiteralPath $safeBlockmap)) { throw "Installer block map is missing" }
          if (-not (Test-Path -LiteralPath $manifest)) { throw "Update manifest is missing" }

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --verify-tag --generate-notes --title "CutScout $env:RELEASE_TAG"
            if ($LASTEXITCODE -ne 0) { throw "Could not create GitHub release" }
          }
          gh release upload $env:RELEASE_TAG $safeInstaller $safeBlockmap $manifest --repo $env:GITHUB_REPOSITORY --clobber
          if ($LASTEXITCODE -ne 0) { throw "Could not upload GitHub release assets" }
